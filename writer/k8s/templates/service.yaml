apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  # Headless service required for StatefulSet pod DNS
  clusterIP: None
  ports:
    - name: http
      port: 8082
      targetPort: 8080
      protocol: TCP
  selector:
    app: {{ .Release.Name }}
