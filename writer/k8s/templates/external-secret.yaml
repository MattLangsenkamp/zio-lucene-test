apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm-store
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-secrets
    creationPolicy: Owner
  data:
    # SQS queue URL — writer consumes documents from this queue
    - secretKey: SQS_QUEUE_URL
      remoteRef:
        key: /zio-lucene/{{ .Values.env }}/sqs/document-ingestion

    # SQS queue URL — writer publishes commit notifications here
    - secretKey: COMMIT_QUEUE_URL
      remoteRef:
        key: /zio-lucene/{{ .Values.env }}/sqs/document-commit

    # S3 bucket name — writer uploads Lucene segments here
    - secretKey: STORAGE_BUCKET
      remoteRef:
        key: /zio-lucene/{{ .Values.env }}/s3/segments
