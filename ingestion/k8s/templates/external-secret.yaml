{{- if ne .Values.env "local" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm-store
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-secrets
    creationPolicy: Owner
  data:
    # SQS queue URL — ingestion writes documents to this queue
    - secretKey: SQS_QUEUE_URL
      remoteRef:
        key: /zio-lucene/{{ .Values.env }}/sqs/document-ingestion
{{- else }}
# Local mode: skip ESO (it can't reach LocalStack) — Pulumi creates this Secret directly.
{{- end }}
